services:
  postgres:
    image: postgres:16
    container_name: airflow-dbt-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  airflow-init:
    build:
      context: ./airflow
    image: airflow-dbt-local:3.0.0
    container_name: airflow-dbt-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-WkoT-MsdxXBT1Hnz8OK68KXV9Le8_yCRGepHeOpyD5E=}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
      AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
      AIRFLOW_CONN_DBT_POSTGRES: postgresql://airflow:airflow@postgres:5432/dbt_demo
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        if ! airflow users list | grep -q "^${_AIRFLOW_WWW_USER_USERNAME:-airflow}[[:space:]]"; then
          airflow users create \
            --username "${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
            --password "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
            --firstname Airflow \
            --lastname Admin \
            --role Admin \
            --email airflow@example.com
        fi

  airflow-apiserver:
    build:
      context: ./airflow
    image: airflow-dbt-local:3.0.0
    container_name: airflow-dbt-apiserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-WkoT-MsdxXBT1Hnz8OK68KXV9Le8_yCRGepHeOpyD5E=}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
      AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
      AIRFLOW_CONN_DBT_POSTGRES: postgresql://airflow:airflow@postgres:5432/dbt_demo
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    command: api-server

  airflow-scheduler:
    build:
      context: ./airflow
    image: airflow-dbt-local:3.0.0
    container_name: airflow-dbt-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-WkoT-MsdxXBT1Hnz8OK68KXV9Le8_yCRGepHeOpyD5E=}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
      AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
      AIRFLOW_CONN_DBT_POSTGRES: postgresql://airflow:airflow@postgres:5432/dbt_demo
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    command: scheduler

  airflow-dag-processor:
    build:
      context: ./airflow
    image: airflow-dbt-local:3.0.0
    container_name: airflow-dbt-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-WkoT-MsdxXBT1Hnz8OK68KXV9Le8_yCRGepHeOpyD5E=}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
      AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
      AIRFLOW_CONN_DBT_POSTGRES: postgresql://airflow:airflow@postgres:5432/dbt_demo
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    command: dag-processor

  airflow-triggerer:
    build:
      context: ./airflow
    image: airflow-dbt-local:3.0.0
    container_name: airflow-dbt-triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-WkoT-MsdxXBT1Hnz8OK68KXV9Le8_yCRGepHeOpyD5E=}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
      AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
      AIRFLOW_CONN_DBT_POSTGRES: postgresql://airflow:airflow@postgres:5432/dbt_demo
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/airflow/dbt
    command: triggerer

volumes:
  postgres_data:
