selectors:
  - name: core_models
    definition:
      union:
        - method: path
          value: models/staging
        - method: path
          value: models/intermediate
        - method: path
          value: models/marts

  - name: marts_only
    definition:
      method: path
      value: models/marts

  - name: staging_only
    definition:
      method: path
      value: models/staging
