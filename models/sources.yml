version: 2

sources:
  - name: raw
    schema: "{{ target.schema }}_raw"
    tables:
      - name: customers
        description: "고객 seed 원천 테이블"
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
      - name: products
        description: "상품 seed 원천 테이블"
        columns:
          - name: product_id
            tests:
              - not_null
              - unique
      - name: orders
        description: "주문 seed 원천 테이블"
        loaded_at_field: loaded_at
        freshness:
          warn_after:
            count: 1
            period: day
          error_after:
            count: 7
            period: day
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
      - name: order_items
        description: "주문상세 seed 원천 테이블"
        columns:
          - name: order_item_id
            tests:
              - not_null
              - unique
