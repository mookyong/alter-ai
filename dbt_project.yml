name: educational_postgres
version: '1.0.0'
config-version: 2

profile: educational_postgres

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  educational_postgres:
    +materialized: view
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      +schema: marts
      +materialized: table

seeds:
  educational_postgres:
    +schema: raw
    +quote_columns: false

snapshots:
  educational_postgres:
    +target_schema: snapshots
